<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Select2 -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#2c3e50,#d90429);
}
.header{
  background:#1d3b73;
  color:white;
  padding:15px;
  text-align:center;

}
.container{width:90%;margin:auto;}
.card{
  background:white;
  padding:20px;
  margin:20px;
  border-radius:15px;
}
input,select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  padding:10px;
  background:#1d3b73;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
table{
  width:100%;
  border-collapse:collapse;
}
th{
  background:#1d3b73;
  color:white;
  padding:10px;
}
td{
  padding:10px;
  text-align:center;
}
</style>

</head>

<body>

<div class="header">Panel Administrativo</div>

<div class="container">

<!-- 🔊 SONIDO -->
<audio id="okSound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3" type="audio/mpeg">
</audio>

<!-- FORMULARIO -->
<div class="card">

<input id="cedula" placeholder="Cédula"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<input id="nombre" placeholder="Nombre"
oninput="this.value=this.value.toUpperCase().replace(/[^A-ZÑÁÉÍÓÚ\s]/g,'')">

<select id="tipo">
<option value="">Tipo</option>
<option>ESTUDIANTE</option>
<option>TRABAJADOR</option>
<option>VISITANTE</option>

</select>

<select id="nivel" onchange="cargarCarreras()">
<option value="">Nivel</option>
<option value="PREGRADO">PREGRADO</option>
<option value="POSGRADO">POSGRADO</option>
<option value="DIPLOMADO">DIPLOMADO</option>
<option value="TECNICO">TECNICO</option>
</select>

<select id="carrera" style="width:300px;"></select>

<input id="celular" placeholder="Celular"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<input id="correo" placeholder="Correo">

<button onclick="registrar()">Registrar</button>

</div>

<!-- TABLA -->
<div class="card">

<h3>Usuarios Registrados</h3>

<input id="buscador" placeholder="Buscar..." onkeyup="filtrar()">

<table>
<thead>
<tr>
<th>Cédula</th>
<th>Nombre</th>
<th>Tipo</th>
<th>Carrera</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaUsuarios"></tbody>

</table>

</div>

</div>

<script>


firebase.initializeApp({
databaseURL:"https://torniquete-universidad-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let editando=false;
let cedulaEditando=null;

/* SELECT2 */
$(document).ready(()=>{
 $("#carrera").select2({
  placeholder:"Seleccione programa"
 });
});

/* CARRERAS COMPLETAS */
function cargarCarreras(){

let lista=[];
const n = nivel.value;

if(n === "PREGRADO"){
lista=[
"ADMINISTRACION DE EMPRESAS",
"CONTADURIA PUBLICA",
"COMUNICACION SOCIAL PERIODISMO",
"ADMINISTRACION DE EMPRESAS TURISTICAS Y HOTELERAS",
"INGENIERIA INDUSTRIAL",
"INGENIERIA MECANICA",
"DERECHO",
"NEGOCIOS Y FINANZAS INTERNACIONALES",
"PSICOLOGIA",
"INGENIERIA MECATRONICA",
"ADMINISTRACION MARITIMA Y FLUVIAL",
"DISEÑO GRAFICO",
"DISEÑO DE ESPACIOS",
"DISEÑO DE MODAS",
"DEPORTE Y CULTURA FISICA",
"CIENCIAS POLITICAS",
"COMUNICACION AUDIOVISUAL",
"TECNICA PROFESIONAL EN OPERACIONES LOGISTICAS",
"INGENIERIA ELECTRONICA",
"INGENIERIA EN ANALITICA DE DATOS",
"NEGOCIOS DIGITALES",
"ARQUITECTURA",
"INGENIERIA DE SISTEMAS"
];
}

else if(n === "POSGRADO"){
lista=[
"ESPECIALIZACION EN TRIBUTACION",
"ESPECIALIZACION EN ALTA GERENCIA",
"ESPECIALIZACION EN GERENCIA DEL TALENTO HUMANO",
"ESPECIALIZACION EN GERENCIA DE PRODUCCION Y OPERACIONES LOGISTICAS",
"ESPECIALIZACION EN FINANZAS",
"ESPECIALIZACION EN GERENCIA DE MERCADEO",
"ESPECIALIZACION EN GESTION DE LA SEGURIDAD Y SALUD EN EL TRABAJO",
"ESPECIALIZACION EN GERENCIA DE LA COMUNICACION ESTRATEGICA",
"ESPECIALIZACION EN ASEGURAMIENTO DE LA INFORMACION FINANCIERA",
"ESPECIALIZACION EN GERENCIA DE PROYECTOS",
"ESPECIALIZACION EN INTELIGENCIA ARTIFICIAL",
"MAESTRIA EN INGENIERIA MECANICA",
"MAESTRIA EN MERCADEO",
"MAESTRIA EN SISTEMAS DE GESTION",
"MAESTRIA EN LOGISTICA INTEGRAL",
"MAESTRIA EN EDUCACION",
"MAESTRIA EN FINANZAS",
"MAESTRIA EN ADMINISTRACION MBA",
"MAESTRIA EN GESTION DE LA CALIDAD EN SERVICIOS DE SALUD",
"MAESTRIA EN GOBERNABILIDAD E INNOVACION DEMOCRATICA Y DERECHOS HUMANOS",
"MAESTRIA EN GERENCIA TRIBUTARIA"
];
}

else if(n === "DIPLOMADO"){
lista=[
"DIPLOMADO EN CONTRATACION ESTATAL"
];
}

else if(n === "TECNICO"){
lista=[
"TECNICO LABORAL EN AUXILIAR ADMINISTRATIVO",
"TECNICO LABORAL EN AUXILIAR CONTABLE Y FINANCIERO",
"TECNICO LABORAL EN AUXILIAR DE PRODUCCION GRAFICA Y ANIMACION DIGITAL",
"TECNICO LABORAL EN AUXILIAR ENERGIA SOLAR FOTOVOLTAICA"
];
}


$("#carrera").empty().select2({
data: lista.map(x=>({id:x,text:x}))
});

}

/* REGISTRAR */
function registrar(){

if(!cedula.value || !nombre.value || !tipo.value){
alert("⚠️ Complete todos los campos");
return;
}

if(!confirm("¿Confirma que los datos son correctos?")) return;

let exp=null;

if(tipo.value==="VISITANTE"){
exp=Date.now()+7*60*60*1000;
}

const data={
nombre:nombre.value,
tipo:tipo.value,
nivel:nivel.value,
carrera:$("#carrera").val(),
celular:celular.value,
correo:correo.value,
expiracion:exp
};

if(editando){
db.ref("usuarios/"+cedulaEditando).update(data);
}else{
db.ref("usuarios/"+cedula.value).set(data);
}

document.getElementById("okSound").play();

/* WhatsApp */
if(tipo.value==="VISITANTE"){

const link=`https://torniquete-system.onrender.com/qr.html?cedula=${cedula.value}`;
const msg=encodeURIComponent(`🎓 Acceso autorizado\n${link}`);
window.open(`https://wa.me/57${celular.value}?text=${msg}`);
}

limpiar();
alert("✅ Guardado correctamente");

}

/* EDITAR */
function editar(c){
db.ref("usuarios/"+c).once("value").then(snap=>{
let u=snap.val();
cedula.value=c;
nombre.value=u.nombre;
tipo.value=u.tipo;
nivel.value=u.nivel;
celular.value=u.celular;
correo.value=u.correo;

cargarCarreras();

setTimeout(()=>{
$("#carrera").val(u.carrera).trigger("change");
},200);

editando=true;
cedulaEditando=c;
});
}

/* LIMPIAR */
function limpiar(){
cedula.value="";
nombre.value="";
tipo.value="";
nivel.value="";
celular.value="";
correo.value="";
$("#carrera").val(null).trigger("change");
editando=false;
cedulaEditando=null;
}

/* MOSTRAR */
let listaUsuarios=[];

db.ref("usuarios").on("value",snap=>{
listaUsuarios=[];

snap.forEach(c=>{
listaUsuarios.push({cedula:c.key,...c.val()});
});

mostrar(listaUsuarios);
});

function mostrar(datos){

let html="";

datos.forEach(u=>{
html+=`
<tr>
<td>${u.cedula}</td>
<td>${u.nombre || ""}</td>
<td>${u.tipo || ""}</td>
<td>${u.carrera || ""}</td>
<td>
<button onclick="editar('${u.cedula}')">✏️</button>
<button onclick="eliminar('${u.cedula}')">🗑️</button>
</td>
</tr>`;
});

tablaUsuarios.innerHTML=html;
}

/* ELIMINAR */
function eliminar(c){
if(confirm("Eliminar usuario?")){
db.ref("usuarios/"+c).remove();
}
}

/* FILTRAR */
function filtrar(){
const t=buscador.value.toLowerCase();
mostrar(listaUsuarios.filter(u =>
(u.nombre || "").toLowerCase().includes(t) ||
u.cedula.includes(t)
));
}

</script>

</body>
</html>
