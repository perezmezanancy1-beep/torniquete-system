<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo</title>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- ✅ jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- ✅ Select2 -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;

    background:linear-gradient(135deg,#2c3e50,#d90429);
}
.header{
    background:#1d3b73;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
}
.container{
    width:90%;
    margin:auto;
}
.card{
    background:white;
    padding:20px;
    margin:20px;
    border-radius:15px;
}
input,select{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#1d3b73;
    color:white;

    cursor:pointer;
}
table{
    width:100%;
    border-collapse:collapse;
}
th{
    background:#1d3b73;
    color:white;
    padding:10px;
}
td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}
#buscador{
    width:50%;
}
</style>

</head>

<body>

<div class="header">
Panel Administrativo - Universidad
</div>

<div class="container">

<!-- FORMULARIO -->
<div class="card">


<input id="cedula" placeholder="Cédula" oninput="soloNumeros(this)">
<input id="nombre" placeholder="Nombre" oninput="formatoNombre(this)">

<select id="tipo">
<option value="">Tipo</option>
<option>ESTUDIANTE</option>
<option>TRABAJADOR</option>
<option>VISITANTE</option>
</select>

<select id="nivel" onchange="cargarCarreras()">
<option value="">Nivel</option>
<option value="PREGRADO">PREGRADO</option>
<option value="POSGRADO">POSGRADO</option>
<option value="DIPLOMADO">DIPLOMADO</option>
<option value="TECNICO">TECNICO</option>
</select>

<select id="carrera" style="width:300px"></select>

<input id="celular" placeholder="Celular" oninput="soloNumeros(this)">
<input id="correo" placeholder="Correo">

<button onclick="confirmar()">Registrar</button>

</div>

<!-- TABLA -->
<div class="card">

<input id="buscador" placeholder="🔎 Buscar..." onkeyup="filtrar()">

<table>
<thead>
<tr>
<th>Cédula</th>
<th>Nombre</th>
<th>Carrera</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaUsuarios"></tbody>
</table>

</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "torniquete-universidad.firebaseapp.com",
  databaseURL: "https://torniquete-universidad-default-rtdb.firebaseio.com",
  projectId: "torniquete-universidad"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let listaUsuarios = [];

// ✅ VALIDACIONES
function soloNumeros(input){
    input.value = input.value.replace(/[^0-9]/g,'');
}

function formatoNombre(input){
    input.value = input.value.toUpperCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^A-Z\s]/g,'');
}

// ✅ SELECT CON BUSCADOR
function cargarCarreras(){

const nivel = document.getElementById("nivel").value;

let lista = [];

if(nivel === "PREGRADO"){
lista = [
"ADMINISTRACION DE EMPRESAS",
"CONTADURIA PUBLICA",
"COMUNICACION SOCIAL PERIODISMO",
"ADMINISTRACION DE EMPRESAS TURISTICAS Y HOTELERAS",
"INGENIERIA INDUSTRIAL",
"INGENIERIA MECANICA",
"DERECHO",
"NEGOCIOS Y FINANZAS INTERNACIONALES",
"PSICOLOGIA",
"INGENIERIA MECATRONICA",
"ADMINISTRACION MARITIMA Y FLUVIAL",
"DISEÑO GRAFICO",
"DISEÑO DE ESPACIOS",
"DISEÑO DE MODAS",
"DEPORTE Y CULTURA FISICA",
"CIENCIAS POLITICAS",
"COMUNICACION AUDIOVISUAL",
"TECNICA PROFESIONAL EN OPERACIONES LOGISTICAS",
"INGENIERIA ELECTRONICA",
"INGENIERIA EN ANALITICA DE DATOS",
"NEGOCIOS DIGITALES",
"ARQUITECTURA",
"INGENIERIA DE SISTEMAS"
];
}

else if(nivel === "POSGRADO"){
lista = [
"ESPECIALIZACION EN TRIBUTACION",
"ESPECIALIZACION EN ALTA GERENCIA",
"ESPECIALIZACION EN GERENCIA DEL TALENTO HUMANO",
"ESPECIALIZACION EN GERENCIA DE PRODUCCION Y OPERACIONES LOGISTICAS",
"ESPECIALIZACION EN FINANZAS",
"ESPECIALIZACION EN GERENCIA DE MERCADEO",
"ESPECIALIZACION EN GESTION DE SEGURIDAD Y SALUD EN EL TRABAJO",
"ESPECIALIZACION EN GERENCIA DE LA COMUNICACION ESTRATEGICA",
"ESPECIALIZACION EN ASEGURAMIENTO DE LA INFORMACION FINANCIERA",
"ESPECIALIZACION EN GERENCIA DE PROYECTOS",
"ESPECIALIZACION EN INTELIGENCIA ARTIFICIAL",
"MAESTRIA EN INGENIERIA MECANICA",
"MAESTRIA EN MERCADEO",
"MAESTRIA EN SISTEMAS DE GESTION",
"MAESTRIA EN LOGISTICA INTEGRAL",
"MAESTRIA EN EDUCACION",
"MAESTRIA EN FINANZAS",
"MAESTRIA EN ADMINISTRACION MBA",
"MAESTRIA EN GESTION DE LA CALIDAD EN SERVICIOS DE SALUD",
"MAESTRIA EN GOBERNABILIDAD E INNOVACION DEMOCRATICA Y DERECHOS HUMANOS",
"MAESTRIA EN GERENCIA TRIBUTARIA"
];
}

else if(nivel === "DIPLOMADO"){
lista = ["DIPLOMADO EN CONTRATACION ESTATAL"];
}

else if(nivel === "TECNICO"){
lista = [
"TECNICO LABORAL EN AUXILIAR ADMINISTRATIVO",
"TECNICO LABORAL EN AUXILIAR CONTABLE Y FINANCIERO",
"TECNICO LABORAL EN AUXILIAR DE PRODUCCION GRAFICA Y ANIMACION DIGITAL",
"TECNICO LABORAL EN AUXILIAR ENERGIA SOLAR FOTOVOLTAICA"
];
}

let data = lista.map(x => ({id:x, text:x}));

$("#carrera").empty().select2({
    data:data,
    placeholder:"Buscar programa...",
    allowClear:true
});

}

// ✅ INICIAR SELECT2
$(document).ready(function(){
    $("#carrera").select2({
        placeholder:"Seleccione programa"
    });
});

// ✅ REGISTRAR
function confirmar(){
    if(confirm("¿Datos correctos?")){
        registrar();
    }
}

function registrar(){

let exp = null;

if(tipo.value === "VISITANTE"){
    exp = Date.now() + (8 * 60 * 60 * 1000);
}

const data = {
    nombre: nombre.value,
    tipo: tipo.value,
    nivel: nivel.value,
    carrera: $("#carrera").val(),
    celular: celular.value,
    correo: correo.value,
    expiracion: exp
};

if(!cedula.value || !nombre.value){
    alert("Faltan datos");
    return;
}

db.ref("usuarios/" + cedula.value).update(data);

alert("✅ Registrado");

limpiar();

// ✅ ENVÍO
const mensaje = "Acceso QR: https://torniquete-system.onrender.com/qr.html";

if(data.tipo === "VISITANTE"){

    if(data.celular){
        window.open(`https://wa.me/57${data.celular}?text=${encodeURIComponent(mensaje)}`);
    }

    if(data.correo){
        window.location.href = `mailto:${data.correo}?subject=QR&body=${encodeURIComponent(mensaje)}`;
    }
}

}

// ✅ LIMPIAR
function limpiar(){
    cedula.value="";
    nombre.value="";
    celular.value="";
    correo.value="";
    nivel.value="";
    $("#carrera").val(null).trigger("change");
}

// ✅ CARGAR TABLA (ARREGLADO)
db.ref("usuarios").on("value", snapshot => {

    listaUsuarios = [];

    snapshot.forEach(child => {
        listaUsuarios.push({
            cedula: child.key,
            ...child.val()
        });
    });

    mostrar(listaUsuarios);
});

// ✅ MOSTRAR
function mostrar(datos){

let html = "";

datos.forEach(u=>{
html += `
<tr>
<td>${u.cedula}</td>
<td>${u.nombre || ""}</td>
<td>${u.carrera || ""}</td>
<td>
<button onclick="editar('${u.cedula}')">✏️</button>
<button onclick="eliminar('${u.cedula}')" style="background:red">🗑️</button>
</td>
</tr>
`;
});

tablaUsuarios.innerHTML = html;
}

// ✅ EDITAR
function editar(c){
    let n = prompt("Nuevo nombre:");
    if(n){
        db.ref("usuarios/" + c).update({nombre:n.toUpperCase()});
    }
}

// ✅ ELIMINAR
function eliminar(c){
    if(confirm("Eliminar usuario?")){
        db.ref("usuarios/" + c).remove();
    }
}

// ✅ BUSCAR
function filtrar(){

const texto = buscador.value.toLowerCase();

const filtrados = listaUsuarios.filter(u =>
    (u.nombre || "").toLowerCase().includes(texto) ||
    u.cedula.includes(texto)
);

mostrar(filtrados);

}

</script>

</body>
</html>
