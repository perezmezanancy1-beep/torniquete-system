<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo</title>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- ✅ jQuery + Select2 -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<style>
body {font-family:Arial;margin:0;background:linear-gradient(135deg,#2c3e50,#d90429);}
.header {background:#1d3b73;color:white;padding:15px;text-align:center;}
.container {width:90%;margin:auto;}
.card {background:white;padding:20px;margin:20px;border-radius:15px;}
input,select,button {padding:10px;margin:5px;border-radius:8px;}
button {background:#1d3b73;color:white;border:none;}
table {width:100%;border-collapse:collapse;}
th {background:#1d3b73;color:white;padding:10px;}
td {padding:10px;text-align:center;}
</style>
</head>

<body>

<div class="header">Panel Administrativo - Universidad</div>

<div class="container">

<!-- REGISTRO -->
<div class="card">


<input id="cedula" placeholder="Cédula" oninput="soloNumeros(this)">
<input id="nombre" placeholder="Nombre" oninput="formatoNombre(this)">

<select id="tipo">
<option value="">Tipo</option>
<option>ESTUDIANTE</option>
<option>TRABAJADOR</option>
<option>VISITANTE</option>
</select>

<select id="nivel" onchange="cargarCarreras()">
<option value="">Nivel</option>
<option value="PREGRADO">PREGRADO</option>
<option value="POSGRADO">POSGRADO</option>
<option value="DIPLOMADO">DIPLOMADO</option>
<option value="TECNICO">TÉCNICO</option>
</select>

<select id="carrera" style="width:300px"></select>

<input id="celular" placeholder="Celular" oninput="soloNumeros(this)">
<input id="correo" placeholder="Correo">

<button onclick="confirmar()">Registrar</button>

</div>

<!-- TABLA -->
<div class="card">
<input id="buscador" placeholder="Buscar..." onkeyup="filtrar()">
<table>
<thead>
<tr>
<th>Cédula</th><th>Nombre</th><th>Carrera</th><th>Acción</th>
</tr>
</thead>
<tbody id="tablaUsuarios"></tbody>
</table>
</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "torniquete-universidad.firebaseapp.com",
databaseURL: "https://torniquete-universidad-default-rtdb.firebaseio.com",
projectId: "torniquete-universidad"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let listaUsuarios=[];

// ✅ VALIDACIONES
function soloNumeros(i){i.value=i.value.replace(/[^0-9]/g,'');}

function formatoNombre(i){
i.value=i.value.toUpperCase()
.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
.replace(/[^A-Z\s]/g,'');
}

// ✅ SELECT MODERNO
function cargarCarreras(){

const nivel=document.getElementById("nivel").value;

let data=[];

if(nivel==="PREGRADO"){
data=[
{ text:"ADMINISTRACION DE EMPRESAS"},
{ text:"CONTADURIA PUBLICA"},
{ text:"COMUNICACION SOCIAL PERIODISMO"},
{ text:"ADMINISTRACION DE EMPRESAS TURISTICAS Y HOTELERAS"},
{ text:"INGENIERIA INDUSTRIAL"},
{ text:"INGENIERIA MECANICA"},
{ text:"DERECHO"},
{ text:"NEGOCIOS Y FINANZAS INTERNACIONALES"},
{ text:"PSICOLOGIA"},
{ text:"INGENIERIA MECATRONICA"},
{ text:"ADMINISTRACION MARITIMA Y FLUVIAL"},
{ text:"DISEÑO GRAFICO"},
{ text:"DISEÑO DE ESPACIOS"},
{ text:"DISEÑO DE MODAS"},
{ text:"DEPORTE Y CULTURA FISICA"},
{ text:"CIENCIAS POLITICAS"},
{ text:"COMUNICACION AUDIOVISUAL"},
{ text:"TECNICA PROFESIONAL EN OPERACIONES LOGISTICAS"},
{ text:"INGENIERIA ELECTRONICA"},
{ text:"INGENIERIA EN ANALITICA DE DATOS"},
{ text:"NEGOCIOS DIGITALES"},
{ text:"ARQUITECTURA"},
{ text:"INGENIERIA DE SISTEMAS"}
];
}

// ✅ POSGRADO ANIDADO
else if(nivel==="POSGRADO"){
data=[
{
text:"ESPECIALIZACIONES",
children:[
{ text:"ESPECIALIZACION EN TRIBUTACION"},
{ text:"ESPECIALIZACION EN ALTA GERENCIA"},
{ text:"ESPECIALIZACION EN GERENCIA DEL TALENTO HUMANO"},
{ text:"ESPECIALIZACION EN GERENCIA DE PRODUCCION Y OPERACIONES LOGISTICAS"},
{ text:"ESPECIALIZACION EN FINANZAS"},
{ text:"ESPECIALIZACION EN GERENCIA DE MERCADEO"},
{ text:"ESPECIALIZACION EN SEGURIDAD Y SALUD EN EL TRABAJO"},
{ text:"ESPECIALIZACION EN GERENCIA DE LA COMUNICACION"},
{ text:"ESPECIALIZACION EN GERENCIA DE PROYECTOS"},
{ text:"ESPECIALIZACION EN INTELIGENCIA ARTIFICIAL"}
]
},
{
text:"MAESTRIAS",
children:[
{ text:"MAESTRIA EN INGENIERIA MECANICA"},
{ text:"MAESTRIA EN MERCADEO"},
{ text:"MAESTRIA EN SISTEMAS DE GESTION"},
{ text:"MAESTRIA EN LOGISTICA INTEGRAL"},
{ text:"MAESTRIA EN EDUCACION"},
{ text:"MAESTRIA EN FINANZAS"},
{ text:"MAESTRIA EN ADMINISTRACION MBA"},
{ text:"MAESTRIA EN GERENCIA TRIBUTARIA"}
]
}
];
}

else if(nivel==="DIPLOMADO"){
data=[{ text:"DIPLOMADO EN CONTRATACION ESTATAL"}];
}

else if(nivel==="TECNICO"){
data=[
{ text:"TECNICO LABORAL EN AUXILIAR ADMINISTRATIVO"},
{ text:"TECNICO LABORAL EN AUXILIAR CONTABLE Y FINANCIERO"},
{ text:"TECNICO LABORAL EN PRODUCCION GRAFICA"},
{ text:"TECNICO LABORAL EN ENERGIA SOLAR"}
];
}

$("#carrera").empty().select2({
data:data,
placeholder:"Seleccione programa",
width:"300px"
});
}

// ✅ INIT SELECT2
$(document).ready(function(){
$("#carrera").select2({
placeholder:"Seleccione programa"
});
});

// ✅ REGISTRO
function confirmar(){
if(confirm("¿Datos correctos?")) registrar();
}

function registrar(){

let exp=null;

if(tipo.value==="VISITANTE"){
exp=Date.now()+(8*60*60*1000);
}

const data={
cedula:cedula.value,
nombre:nombre.value,
tipo:tipo.value,
nivel:nivel.value,
carrera:$("#carrera").val(),
celular:celular.value,
correo:correo.value,
expiracion:exp,
};

if(!data.cedula||!data.nombre){alert("Faltan datos");return;}

db.ref("usuarios/"+data.cedula).set(data);

alert("✅ Registrado");

limpiar();

if(data.tipo==="VISITANTE"){
const msg="Acceso QR: https://torniquete-system.onrender.com/qr.html";

if(data.celular)
window.open(`https://wa.me/57${data.celular}?text=${encodeURIComponent(msg)}`);

if(data.correo)
window.open(`mailto:${data.correo}?body=${msg}`);
}
}

// ✅ LIMPIAR
function limpiar(){
cedula.value="";nombre.value="";celular.value="";
correo.value="";nivel.value="";$("#carrera").val(null).trigger("change");
}

// ✅ TABLA
db.ref("usuarios").on("value",s=>{
listaUsuarios=[];
s.forEach(c=>listaUsuarios.push(c.val()));
mostrar(listaUsuarios);
});

function mostrar(d){
let html="";
d.forEach(u=>{
html+=`<tr>
<td>${u.cedula}</td>
<td>${u.nombre}</td>
<td>${u.carrera||""}</td>
<td>
<button onclick="editar('${u.cedula}')">✏️</button>
<button onclick="eliminar('${u.cedula}')">🗑️</button>
</td>
</tr>`;
});
tablaUsuarios.innerHTML=html;
}

function editar(c){
let n=prompt("Nuevo nombre:");
if(n) db.ref("usuarios/"+c).update({nombre:n.toUpperCase()});
}

function eliminar(c){
if(confirm("Eliminar?")) db.ref("usuarios/"+c).remove();
}

function filtrar(){
const t=buscador.value.toLowerCase();
mostrar(listaUsuarios.filter(u=>u.nombre.toLowerCase().includes(t)||u.cedula.includes(t)));
}

</script>

</body>
</html>
