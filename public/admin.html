<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrativo</title>

https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {margin:0;font-family:Arial;background:linear-gradient(135deg,#2c3e50,#d90429);}
.header {background:#1d3b73;color:white;padding:15px;text-align:center;font-size:20px;font-weight:bold;}
.container {width:90%;margin:auto;margin-top:20px;}
.card {background:white;padding:20px;border-radius:15px;margin-bottom:20px;}
input,select {padding:10px;margin:5px;border-radius:8px;border:1px solid #ccc;}
button {padding:10px 15px;border:none;border-radius:8px;cursor:pointer;background:#1d3b73;color:white;}
table {width:100%;border-collapse:collapse;}
th {background:#1d3b73;color:white;padding:10px;}
td {padding:10px;text-align:center;border-bottom:1px solid #ddd;}
#buscador {width:50%;}
</style>
</head>

<body>

<div class="header">Panel Administrativo - Universidad</div>

<div class="container">

<div class="card">
<h3>Registrar Usuario</h3>

<input id="cedula" placeholder="Cédula" oninput="soloNumeros(this)">
<input id="nombre" placeholder="Nombre" oninput="formatoNombre(this)">

<select id="tipo">
<option value="">Tipo</option>
<option>ESTUDIANTE</option>
<option>TRABAJADOR</option>
<option>VISITANTE</option>
</select>

<select id="nivel" onchange="cargarCarreras()">
<option value="">Nivel</option>
<option value="PREGRADO">PREGRADO</option>
<option value="ESPECIALIZACION">ESPECIALIZACIÓN</option>
<option value="MAESTRIA">MAESTRÍA</option>
<option value="DIPLOMADO">DIPLOMADO</option>
<option value="TECNICO">TÉCNICO</option>
</select>

<select id="carrera"></select>

<input id="celular" placeholder="Celular" oninput="soloNumeros(this)">
<input id="correo" placeholder="Correo">

<button onclick="confirmar()">Registrar</button>
</div>

<div class="card">
<input id="buscador" placeholder="🔎 Buscar..." onkeyup="filtrar()">
<table>
<thead>
<tr>
<th>Cédula</th><th>Nombre</th><th>Carrera</th><th>Acción</th>
</tr>
</thead>
<tbody id="tablaUsuarios"></tbody>
</table>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "torniquete-universidad.firebaseapp.com",
  databaseURL: "https://torniquete-universidad-default-rtdb.firebaseio.com",
  projectId: "torniquete-universidad"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let listaUsuarios=[];

function soloNumeros(i){i.value=i.value.replace(/[^0-9]/g,'');}

function formatoNombre(i){
i.value=i.value.toUpperCase()
.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
.replace(/[^A-Z\s]/g,'');
}

function mensaje(t){alert(t);}

function limpiar(){
cedula.value="";nombre.value="";celular.value="";
correo.value="";carrera.innerHTML="";nivel.value="";tipo.value="";
}

function cargarCarreras(){
const nivel=document.getElementById("nivel").value;
const c=document.getElementById("carrera");

let op=[];

if(nivel==="PREGRADO"){op=["ADMINISTRACION DE EMPRESAS","CONTADURIA PUBLICA","INGENIERIA DE SISTEMAS"];}

c.innerHTML="<option>Seleccione</option>";
op.forEach(o=>c.innerHTML+=`<option>${o}</option>`);
}

function confirmar(){
if(confirm("¿Datos correctos?")) registrar();
}

function registrar(){

let exp=null;
if(tipo.value==="VISITANTE"){
exp=Date.now()+(8*60*60*1000);
}

const data={
cedula:cedula.value,
nombre:nombre.value,
tipo:tipo.value,
nivel:nivel.value,
carrera:carrera.value,
celular:celular.value,
correo:correo.value,
fecha:Date.now(),
expiracion:exp
};

if(!data.cedula||!data.nombre||!data.tipo){
mensaje("Faltan datos");return;
}

db.ref("usuarios/"+data.cedula).once("value",snap=>{
if(snap.exists()){mensaje("Existe");return;}

db.ref("usuarios/"+data.cedula).set(data);
mensaje("✅ Registrado");
limpiar();

if(data.tipo==="VISITANTE"){
const msg="QR válido 8h: https://torniquete-system.onrender.com/qr.html";

if(data.celular)window.open(`https://wa.me/57${data.celular}?text=${msg}`);
if(data.correo)window.open(`mailto:${data.correo}?body=${msg}`);
}

});

}

db.ref("usuarios").on("value",s=>{
listaUsuarios=[];
s.forEach(c=>listaUsuarios.push(c.val()));
mostrar(listaUsuarios);
});

function mostrar(d){
let html="";
d.forEach(u=>{
html+=`<tr>
<td>${u.cedula}</td>
<td>${u.nombre}</td>
<td>${u.carrera||""}</td>
<td>
<button onclick="editar('${u.cedula}')">✏️</button>
<button onclick="eliminar('${u.cedula}')">🗑️</button>
</td>
</tr>`;
});
tablaUsuarios.innerHTML=html;
}

function editar(c){
const n=prompt("Nombre").toUpperCase();
if(n) db.ref("usuarios/"+c).update({nombre:n});
}

function eliminar(c){
if(confirm("Eliminar?")){
db.ref("usuarios/"+c).remove();
}
}

function filtrar(){
const t=buscador.value.toLowerCase();
mostrar(listaUsuarios.filter(u=>u.nombre.toLowerCase().includes(t)||u.cedula.includes(t)));
}

</script>

</body>
</html>
