<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- ✅ Firebase -->
https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js</script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- ✅ QR LIBRERIA (CORREGIDO) -->
.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    background:linear-gradient(#2c3e50,#d90429);
    font-family:Arial;
}


.card{
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

/* ✅ LOGO */
.logo{
    width:80px;
    display:block;
    margin:auto;
    margin-bottom:10px;
}


#qr{
    display:flex;
    justify-content:center;
    margin:15px 0;
}

#timer{
    color:red;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<!-- ✅ LOGO REAL -->
img/logo1.png

<h3>Universidad Autónoma del Caribe</h3>


<div id="loginBox">
<input id="cedulaInput" placeholder="Cédula"><br><br>
<button onclick="login()">Ingresar</button>
</div>


<div id="qrView" style="display:none">

<h3 id="nombre"></h3>
<p id="carrera"></p>
<p id="tipo"></p>
<p id="detalle"></p>

<div id="estado"></div>

<div id="qr"></div>


<p id="timer"></p>

</div>

</div>







<script>

firebase.initializeApp({
databaseURL:"https://torniquete-universidad-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let user, cedula, intervaloQR;

// ✅ LOGIN
function login(){

    cedula = cedulaInput.value;

    db.ref("usuarios/" + cedula).once("value").then(s=>{

        if(!s.exists()){
            alert("No existe");
            return;
        }

        user = s.val();

        if(user.tipo==="VISITANTE" && Date.now()>user.expiracion){
            loginBox.innerHTML="<h2 style='color:red'>⛔ CADUCADO</h2>";
            return;
        }

        mostrar();
    });


}


// ✅ MOSTRAR
function mostrar(){

    loginBox.style.display="none";
    qrView.style.display="block";

    nombre.innerText = user.nombre;
    carrera.innerText = user.carrera || "";
    tipo.innerText = "👤 " + user.tipo;

    if(user.tipo==="TRABAJADOR"){
        detalle.innerText="🏷 " + (user.tipoTrabajador || "");
    }

    estado.innerHTML="<span style='color:green'>✅ ACCESO PERMITIDO</span>";

    generarQR();
    intervaloQR = setInterval(generarQR, 30000);

}

// ✅ QR DINÁMICO
function generarQR(){

    qr.innerHTML="";

    new QRCode(qr,{
        text: cedula + "-" + Date.now(),
        width:200,
        height:200
    });

}

// ✅ TIMER
setInterval(()=>{

    if(user && user.tipo==="VISITANTE"){

        let r = user.expiracion - Date.now();

        if(r<=0){
            timer.innerText="⛔ Expirado";
            return;
        }

        let m = Math.floor(r/60000);
        let s = Math.floor((r%60000)/1000);

        timer.innerText=`⏳ ${m}m ${s}s`;

    }else if(user){
        timer.innerText="✅ Acceso permanente";
    }

},1000);

</script>

</body>
</html>
