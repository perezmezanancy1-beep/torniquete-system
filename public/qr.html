<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- ✅ QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    margin:0;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#2c3e50,#d90429);
    font-family:Arial;
}
.card{
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;

}
.logo{
    width:80px;
    margin-bottom:10px;
}
#qr{margin:15px;}
#timer{color:red;font-weight:bold;}
</style>

</head>

<body>

<div class="card">

<!-- ✅ LOGO CORRECTO -->
<img src="img/logo1.png" class="logo">

<h3>Universidad Autónoma del Caribe</h3>

<!-- LOGIN -->
<div id="loginBox">
<input id="cedulaInput" placeholder="Cédula"><br><br>
<button onclick="login()">Ingresar</button>
</div>

<!-- QR -->
<div id="qrView" style="display:none">

<h3 id="nombre"></h3>
<p id="carrera"></p>

<div id="qr"></div>

<p id="timer"></p>

</div>

</div>

<!-- ✅ AUDIO -->
<audio id="beep" src="sounds/sounds-beep.mp3"></audio>

<script>

// ✅ Firebase
firebase.initializeApp({
 databaseURL:"https://torniquete-universidad-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let usuario;
let cedula;
let inicioQR=0;

// ✅ LOGIN
function login(){

    cedula = document.getElementById("cedulaInput").value.trim();

    if(!cedula){
        alert("Ingrese una cédula");
        return;
    }

    db.ref("usuarios/"+cedula).once("value")
    .then(s=>{

        if(!s.exists()){
            alert("❌ Usuario no encontrado");
            return;
        }

        usuario=s.val();

        document.getElementById("loginBox").style.display="none";
        document.getElementById("qrView").style.display="block";

        document.getElementById("nombre").innerText=usuario.nombre;
        document.getElementById("carrera").innerText=usuario.carrera;

        generarQR();
    });
}

// ✅ GENERAR QR
function generarQR(){

    inicioQR = Date.now();

    const data = cedula + "|" + inicioQR;

    document.getElementById("qr").innerHTML="";

    new QRCode(document.getElementById("qr"),{
        text:data,
        width:200,
        height:200
    });


    document.getElementById("beep").play();
}

// ✅ CONTADOR
setInterval(()=>{

    if(!usuario) return;

    let restante = 30000 - (Date.now() - inicioQR);

    if(restante <= 0){
        generarQR();
        restante = 30000;
    }

    document.getElementById("timer").innerText =
    "⏳ Nuevo QR en: " + Math.floor(restante/1000) + "s";

},1000);

</script>

</body>
</html>
