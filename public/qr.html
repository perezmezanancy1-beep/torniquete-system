<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: linear-gradient(135deg,#2c3e50,#d90429);
    font-family: Arial;
}


.card {
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;
}


.logo {
    width:70px;
    margin-bottom:10px;
}

#qr {
    display:flex;
    justify-content:center;
}

#timer {
    color:red;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="card">


<img src="img/logo1.png" class="logo">

<h3>Universidad Autónoma del Caribe</h3>

<div id="loginBox">
    <input id="cedulaInput" placeholder="Cédula"><br><br>
    <button onclick="login()">Ingresar</button>
</div>

<div id="qrView" style="display:none">

    <h3 id="nombre"></h3>
    <p id="carrera"></p>

    <div id="qr"></div>
    <p id="timer"></p>

</div>

</div>

<audio id="beep" src="sounds/sounds-beep.mp3"></audio>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCK9tiHu5ct3XY_uo5nIOMZCXN6xCmy-H4",
  authDomain: "torniquete-universidad.firebaseapp.com",
  databaseURL: "https://torniquete-universidad-default-rtdb.firebaseio.com",
  projectId: "torniquete-universidad"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cedula = "";
let usuario;
let tiempo = 30;
let intervalo;

// ✅ LOGIN
function login(){

    cedula = document.getElementById("cedulaInput").value;

    db.ref("usuarios/" + cedula).once("value")
    .then(snapshot => {

        if(snapshot.exists()){

            usuario = snapshot.val();

            document.getElementById("loginBox").style.display="none";
            document.getElementById("qrView").style.display="block";

            document.getElementById("nombre").innerText = usuario.nombre;
            document.getElementById("carrera").innerText = usuario.carrera;

            generarQR();
            iniciarTimer();

        } else {
            alert("Usuario no encontrado");
        }

    });
}

// ✅ GENERAR QR (ARREGLADO)
function generarQR(){

    document.getElementById("qr").innerHTML = "";

    new QRCode(document.getElementById("qr"), {
        text: cedula,   // ✅ SOLO LA CÉDULA (CLAVE)
        width:200,
        height:200
    });

    document.getElementById("beep").play();
}

// ✅ TIMER
function iniciarTimer(){

    tiempo = 30;
    clearInterval(intervalo);

    intervalo = setInterval(()=>{

        tiempo--;

        document.getElementById("timer").innerText =
            "Este QR expira en " + tiempo + " segundos";

        if(tiempo <= 0){
            generarQR();
            tiempo = 30;
        }

    },1000);
}

</script>

</body>
</html>
