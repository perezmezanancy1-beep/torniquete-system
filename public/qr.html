<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- ✅ QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    margin:0;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#2c3e50,#d90429);
    font-family:Arial;
}

.card {
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;

}

/* ✅ LOGO */
.logo {

    width:80px;
    display:block;
    margin:auto;
    margin-bottom:10px;
}

/* ✅ QR */
#qr {
    display:flex;
    justify-content:center;
    margin:15px 0;
}

#estado {

    font-weight:bold;
    margin-top:10px;
}

#timer {
    color:red;
    margin-top:10px;
    font-weight:bold;
}

#hora {
    font-size:14px;
    color:#555;
}
</style>

</head>

<body>

<div class="card">

<!-- ✅ LOGO (ESTA LÍNEA ES CLAVE) -->
<img src="img/logo1.png" class="logo">

<h3>Universidad Autónoma del Caribe</h3>

<!-- LOGIN -->
<div id="loginBox">
    <input id="cedulaInput" placeholder="Cédula"><br><br>
    <button onclick="login()">Ingresar</button>
</div>

<!-- QR -->
<div id="qrView" style="display:none">

    <h3 id="nombre"></h3>
    <p id="carrera"></p>
    <p id="tipo"></p>
    <p id="detalle"></p>

    <div id="estado"></div>

    <div id="qr"></div>

    <!-- ✅ HORA -->
    <p id="hora"></p>

    <!-- ✅ TIEMPO -->
    <p id="timer"></p>

</div>

</div>








<script>

// ✅ Firebase
firebase.initializeApp({
databaseURL:"https://torniquete-universidad-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let usuario;
let cedula;
let intervaloQR;

// ✅ LOGIN
function login(){

    cedula = document.getElementById("cedulaInput").value.trim();

    if(!cedula){
        alert("Ingrese cédula");
        return;
    }

    db.ref("usuarios/" + cedula).once("value")
    .then(s => {

        if(!s.exists()){
            alert("❌ Usuario no encontrado");
            return;
        }

        usuario = s.val();


        if(usuario.tipo === "VISITANTE" && Date.now() > usuario.expiracion){
            document.getElementById("loginBox").innerHTML =
            "<h2 style='color:red'>⛔ QR EXPIRADO</h2>";
            return;
        }

        mostrar();

    });
}

// ✅ MOSTRAR
function mostrar(){

    document.getElementById("loginBox").style.display="none";
    document.getElementById("qrView").style.display="block";

    document.getElementById("nombre").innerText = usuario.nombre || "";
    document.getElementById("carrera").innerText = usuario.carrera || "";
    document.getElementById("tipo").innerText = "👤 " + usuario.tipo;

    if(usuario.tipo === "TRABAJADOR"){
        document.getElementById("detalle").innerText =
        "🏷 " + (usuario.tipoTrabajador || "");
    }

    document.getElementById("estado").innerHTML =
    "<span style='color:green'>✅ ACCESO PERMITIDO</span>";

    generarQR();
    
    intervaloQR = setInterval(generarQR, 30000);
}

// ✅ QR DINÁMICO
function generarQR(){

    document.getElementById("qr").innerHTML = "";

    new QRCode(document.getElementById("qr"), {
        text: cedula + "-" + Date.now(),
        width:200,
        height:200
    });
}

// ✅ HORA + TIEMPO RESTANTE
setInterval(()=>{

    if(!usuario) return;

    // ✅ HORA ACTUAL
    let ahora = new Date();
    let h = ahora.getHours().toString().padStart(2,"0");
    let m = ahora.getMinutes().toString().padStart(2,"0");
    let s = ahora.getSeconds().toString().padStart(2,"0");

    document.getElementById("hora").innerText =
        `🕒 ${h}:${m}:${s}`;

    // ✅ VISITANTE → TIEMPO COMPLETO
    if(usuario.tipo === "VISITANTE"){

        let restante = usuario.expiracion - Date.now();

        if(restante <= 0){
            document.getElementById("timer").innerText = "⛔ Expirado";
            return;
        }

        let horas = Math.floor(restante / (1000 * 60 * 60));
        let minutos = Math.floor((restante % (1000 * 60 * 60)) / (1000 * 60));
        let segundos = Math.floor((restante % (1000 * 60)) / 1000);

        document.getElementById("timer").innerText =
            `⏳ ${horas.toString().padStart(2,'0')}h `
          + `${minutos.toString().padStart(2,'0')}m `
          + `${segundos.toString().padStart(2,'0')}s`;

    } else {

        document.getElementById("timer").innerText =
        "✅ Acceso permanente";
    }

},1000);

</script>

</body>
</html>
