<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- ✅ Firebase (BIEN ESCRITO) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebasept>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- ✅ QR LIBRERIA (BIEN ESCRITO) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2c3e50,#d90429);
    font-family:Arial;
}


.card{
    background:white;
    padding:25px;
    border-radius:20px;

    text-align:center;
    width:320px;
}

/* ✅ LOGO */
.logo{
    width:80px;
    display:block;
    margin:auto;
    margin-bottom:10px;
}


#qr{
    display:flex;
    justify-content:center;
    margin:15px 0;
}

#estado{
    font-weight:bold;
    margin-top:10px;
}

#timer{
    color:red;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="card">

<!-- ✅ LOGO CORRECTO -->
<img src="img/logo1.png" class="logo">

<h3>Universidad Autónoma del Caribe</h3>

<!-- LOGIN -->
<div id="loginBox">
<input id="cedulaInput" placeholder="Cédula"><br><br>
<button onclick="login()">Ingresar</button>
</div>

<!-- QR -->
<div id="qrView" style="display:none">

<h3 id="nombre"></h3>
<p id="carrera"></p>
<p id="tipo"></p>
<p id="detalle"></p>

<div id="estado"></div>

<div id="qr"></div>


<p id="timer"></p>

</div>

</div>








<script>

// ✅ Firebase config
firebase.initializeApp({
databaseURL:"https://torniquete-universidad-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let user, cedula, intervaloQR;

// ✅ LOGIN
function login(){

cedula = document.getElementById("cedulaInput").value;

if(!cedula){
alert("Ingrese cédula");
return;
}

db.ref("usuarios/" + cedula).once("value").then(s=>{

if(!s.exists()){
alert("❌ Usuario no existe");
return;
}

user = s.val();

// ✅ VALIDAR VISITANTE
if(user.tipo==="VISITANTE" && Date.now()>user.expiracion){
loginBox.innerHTML="<h2 style='color:red'>⛔ QR EXPIRADO</h2>";
return;
}

mostrar();

});


}

// ✅ MOSTRAR DATOS
function mostrar(){

document.getElementById("loginBox").style.display="none";
document.getElementById("qrView").style.display="block";

document.getElementById("nombre").innerText = user.nombre;
document.getElementById("carrera").innerText = user.carrera || "";
document.getElementById("tipo").innerText = "👤 " + user.tipo;

if(user.tipo==="TRABAJADOR"){
document.getElementById("detalle").innerText = "🏷 " + (user.tipoTrabajador||"");
}

document.getElementById("estado").innerHTML =
"<span style='color:green'>✅ ACCESO PERMITIDO</span>";

generarQR();
intervaloQR = setInterval(generarQR,30000);

}

// ✅ GENERAR QR DINÁMICO
function generarQR(){

document.getElementById("qr").innerHTML="";

new QRCode(document.getElementById("qr"),{
text: cedula + "-" + Date.now(),
width:200,
height:200
});

}

// ✅ CONTADOR
setInterval(()=>{

if(!user) return;

if(user.tipo==="VISITANTE"){

let restante = user.expiracion - Date.now();

if(restante <= 0){
document.getElementById("timer").innerText = "⛔ Expirado";
return;
}

let m = Math.floor(restante / 60000);
let s = Math.floor((restante % 60000)/1000);

document.getElementById("timer").innerText =
`⏳ ${m}m ${s}s`;

}else{

document.getElementById("timer").innerText =
"✅ Acceso permanente";

}

},1000);

</script>

</body>
</html>
