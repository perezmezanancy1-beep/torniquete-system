<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- ✅ QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: linear-gradient(135deg,#2c3e50,#d90429);
    font-family: Arial;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

/* ✅ LOGO */
.logo{
    width:80px;
    margin-bottom:10px;
}

#qr{
    display:flex;
    justify-content:center;
    margin-top:10px;
}

#estado{
    font-weight:bold;
    margin:10px;
}

#timer{
    color:red;


    font-weight:bold;
}

#hora{
    font-size:13px;
    color:#555;
}
</style>

</head>

<body>

<div class="card">

<!-- ✅ LOGO -->
img/logo1.png

<h3>Universidad Autónoma del Caribe</h3>

<!-- LOGIN -->
<div id="loginBox">
    <input id="cedulaInput" placeholder="Cédula"><br><br>
    <button onclick="login()">Ingresar</button>
</div>

<!-- QR -->
<div id="qrView" style="display:none">

<h3 id="nombre"></h3>
<p id="carrera"></p>

<p id="tipoUsuario"></p>

<div id="estado"></div>

<div id="qr"></div>

<p id="hora"></p>
<p id="timer"></p>

</div>

</div>




<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "torniquete-universidad.firebaseapp.com",
  databaseURL: "https://torniquete-universidad-default-rtdb.firebaseio.com",
  projectId: "torniquete-universidad"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();



let usuario;
let cedula;
let intervalo;
let intervaloQR;

// ✅ LOGIN
function login(){

    cedula = document.getElementById("cedulaInput").value;

    if(!cedula){
        alert("Ingrese cédula");
        return;
    }

    db.ref("usuarios/" + cedula).once("value")
    .then(snapshot => {

        if(!snapshot.exists()){
            alert("❌ Usuario no registrado");
            return;
        }

        usuario = snapshot.val();

        // ✅ VALIDAR VISITANTE
        if(usuario.tipo === "VISITANTE"){

            if(!usuario.expiracion || Date.now() > usuario.expiracion){
                bloquear("QR expirado (8 horas)");
                return;
            }
        }

        mostrar();

    });
}

// ✅ MOSTRAR
function mostrar(){

    loginBox.style.display="none";
    qrView.style.display="block";

    nombre.innerText = usuario.nombre || "";
    carrera.innerText = usuario.carrera || "";

    tipoUsuario.innerHTML = "👤 " + (usuario.tipo || "");

    estado.innerHTML = "<span style='color:green;'>✅ ACCESO PERMITIDO</span>";

    generarQR();
    iniciarTimer();
    iniciarQRDinamico();
}



// ✅ BLOQUEAR
function bloquear(msg){

    loginBox.innerHTML = `
    <h2 style="color:red;">⛔ ACCESO DENEGADO</h2>
    <p>${msg}</p>
    `;
}

// ✅ QR DINÁMICO (CADA 30s)
function iniciarQRDinamico(){

    clearInterval(intervaloQR);

    intervaloQR = setInterval(()=>{
        generarQR();
    },30000);
}

// ✅ GENERAR QR
function generarQR(){

    document.getElementById("qr").innerHTML = "";

    // ✅ CAMBIO DINÁMICO (timestamp)
    const contenido = cedula + "-" + Date.now();

    new QRCode(document.getElementById("qr"), {
        text: contenido,
        width:200,
        height:200
    });


}

// ✅ TIMER + HORA REAL
function iniciarTimer(){

clearInterval(intervalo);

intervalo = setInterval(()=>{

    const ahora = new Date();

    // ✅ HORA ACTUAL
    let h = ahora.getHours().toString().padStart(2,"0");
    let m = ahora.getMinutes().toString().padStart(2,"0");
    let s = ahora.getSeconds().toString().padStart(2,"0");

    document.getElementById("hora").innerText =
        `🕒 ${h}:${m}:${s}`;

    // ✅ VISITANTE
    if(usuario.tipo === "VISITANTE"){

        let restante = usuario.expiracion - Date.now();

        if(restante <= 0){
            clearInterval(intervalo);
            bloquear("QR expirado");
            return;
        }

        let minutos = Math.floor(restante / 60000);
        let segundos = Math.floor((restante % 60000)/1000);

        timer.innerHTML = `⏳ Expira en ${minutos}m ${segundos}s`;

    } else {
        timer.innerHTML = "<span style='color:green;'>✅ Acceso permanente</span>";
    }

},1000);

}

</script>

</body>
</html>
