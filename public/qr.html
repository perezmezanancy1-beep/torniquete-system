<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- ✅ QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    margin:0;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#2c3e50,#d90429);
    font-family:Arial;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.logo{
    width:80px;
    margin-bottom:10px;
}

#qr{
    margin:20px auto;

}

#nombre{
    font-size:18px;
    font-weight:bold;
}

#tipo{
    font-weight:bold;
    margin-top:5px;
}

#estado{
    margin-top:10px;
    font-weight:bold;
}

#timer{
    color:red;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<!-- ✅ LOGO (IMPORTANTE) -->
<img src="img/logo1.png" class="logo">

<h3>Universidad Autónoma del Caribe</h3>

<!-- ✅ LOGIN -->
<div id="loginBox">
<input id="cedulaInput" placeholder="Cédula"><br><br>
<button onclick="login()">Ingresar</button>
</div>

<!-- ✅ QR -->
<div id="qrView" style="display:none">

<h3 id="nombre"></h3>
<p id="carrera"></p>

<p id="tipo"></p>
<p id="estado"></p>

<div id="qr"></div>

<p id="timer"></p>

</div>

</div>

<!-- ✅ AUDIO CORRECTO -->
<audio id="beep">
    <source src="sounds/beep.mp3" type="audio/mpeg">
</audio>

<script>



firebase.initializeApp({
 databaseURL:"https://torniquete-universidad-default-rtdb.firebaseio.com"
});

const db = firebase.database();

let usuario;
let cedula;
let inicioQR = 0;

// ✅ LOGIN CON CONTROL VISITANTE
function login(){

    cedula = document.getElementById("cedulaInput").value.trim();

    if(!cedula){
        alert("Ingrese cédula");
        return;
    }

    db.ref("usuarios/"+cedula).once("value")
    .then(s=>{

        if(!s.exists()){
            alert("❌ Usuario no encontrado");
            return;
        }

        usuario = s.val();

        // 🔓 desbloquear audio en navegador
        document.getElementById("beep").play().catch(()=>{});

        // ✅ VISITANTE 7 HORAS
        if(usuario.tipo === "VISITANTE"){

            let ahora = Date.now();
            let limite = 7 * 60 * 60 * 1000;

            if(!usuario.inicio){
                db.ref("usuarios/"+cedula).update({
                    inicio: ahora
                });
                usuario.inicio = ahora;
            }

            if(ahora - usuario.inicio > limite){
                alert("⛔ Acceso denegado (visitante expirado)");
                return;
            }
        }

        mostrar();
    });
}

// ✅ MOSTRAR
function mostrar(){

    document.getElementById("loginBox").style.display="none";
    document.getElementById("qrView").style.display="block";

    document.getElementById("nombre").innerText = usuario.nombre || "";
    document.getElementById("carrera").innerText = usuario.carrera || "";


    document.getElementById("tipo").innerText =
        "👤 " + (usuario.tipo || "USUARIO");


    if(usuario.tipo === "VISITANTE"){
        document.getElementById("estado").innerHTML =
            "<span style='color:orange'>⏳ Visitante activo</span>";
    } else {
        document.getElementById("estado").innerHTML =
            "<span style='color:green'>✅ Acceso permanente</span>";
    }

    generarQR();
}

// ✅ QR DINÁMICO (SOLO NÚMEROS)
function generarQR(){

    inicioQR = Date.now();
    

    const data = cedula + inicioQR;

    document.getElementById("qr").innerHTML="";

    new QRCode(document.getElementById("qr"),{
        text:data,
        width:200,
        height:200
    });

    const audio = document.getElementById("beep");
    audio.currentTime = 0;
    audio.play().catch(()=>{});
}

// ✅ CONTADOR + TIEMPO VISITANTE
setInterval(()=>{

    if(!usuario) return;

    // QR TIMER
    let restante = 30000 - (Date.now() - inicioQR);

    if(restante <= 0){
        generarQR();
        restante = 30000;
    }

    document.getElementById("timer").innerText =
        "⏳ Nuevo QR en: " + Math.floor(restante/1000) + "s";

    // VISITANTE TIMER
    if(usuario.tipo === "VISITANTE" && usuario.inicio){

        let total = 7 * 60 * 60 * 1000;
        let restanteVisita = total - (Date.now() - usuario.inicio);

        if(restanteVisita <= 0){
            document.getElementById("estado").innerHTML =
                "<span style='color:red'>⛔ Expirado</span>";
            return;
        }

        let horas = Math.floor(restanteVisita / (1000*60*60));
        let minutos = Math.floor((restanteVisita % (1000*60*60))/(1000*60));

        document.getElementById("estado").innerHTML =
            `⏳ Visitante: ${horas}h ${minutos}m restantes`;
    }

},1000);

</script>

</body>
</html>
