<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- ✅ QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#2c3e50,#d90429);
    font-family:Arial;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

#qr{
    display:flex;
    justify-content:center;
    margin-top:10px;
}

#timer{
    margin-top:10px;
    font-weight:bold;
    color:red;
}

#estado{
    font-weight:bold;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="card">

<!-- LOGIN -->
<div id="loginBox">
<input id="cedulaInput" placeholder="Cédula"><br><br>
<button onclick="login()">Ingresar</button>
</div>

<!-- QR -->
<div id="qrView" style="display:none">

<h3 id="nombre"></h3>
<p id="carrera"></p>

<div id="estado"></div>

<div id="qr"></div>

<p id="timer"></p>

</div>

</div>




<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "torniquete-universidad.firebaseapp.com",
  databaseURL: "https://torniquete-universidad-default-rtdb.firebaseio.com",
  projectId: "torniquete-universidad"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();



let usuario;
let cedula;
let intervalo;

// ✅ LOGIN
function login(){

    cedula = document.getElementById("cedulaInput").value;

    if(!cedula){
        alert("Ingrese cédula");
        return;
    }

    db.ref("usuarios/" + cedula).once("value")
    .then(snapshot => {

        if(!snapshot.exists()){
            alert("❌ Usuario no registrado");
            return;
        }

        usuario = snapshot.val();

        // ✅ VALIDAR EXPIRACIÓN PARA VISITANTES
        if(usuario.tipo === "VISITANTE"){

            if(!usuario.expiracion){
                bloquear("QR no válido");
                return;
            }

            if(Date.now() > usuario.expiracion){
                bloquear("QR expirado (8 horas)");
                return;
            }
        }

        mostrarQR();

    });
}


// ✅ MOSTRAR QR
function mostrarQR(){

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("qrView").style.display = "block";

    document.getElementById("nombre").innerText = usuario.nombre || "";
    document.getElementById("carrera").innerText = usuario.carrera || "";

    document.getElementById("estado").innerHTML =
        "<span style='color:green;'>✅ ACCESO PERMITIDO</span>";

    generarQR();
    iniciarTimer();
}


// ✅ BLOQUEAR
function bloquear(mensaje){

    document.getElementById("loginBox").innerHTML = `
        <h2 style="color:red;">⛔ ACCESO DENEGADO</h2>
        <p>${mensaje}</p>
    `;
}


// ✅ GENERAR QR
function generarQR(){

    document.getElementById("qr").innerHTML = "";

    new QRCode(document.getElementById("qr"), {
        text: cedula,
        width:200,
        height:200
    });


}



// ✅ TIMER REAL
function iniciarTimer(){

clearInterval(intervalo);

intervalo = setInterval(()=>{

    if(usuario.tipo === "VISITANTE"){

        let restante = usuario.expiracion - Date.now();

        if(restante <= 0){
            clearInterval(intervalo);
            bloquear("QR expirado");
            return;
        }

        let minutos = Math.floor(restante / 60000);
        let segundos = Math.floor((restante % 60000)/1000);

        document.getElementById("timer").innerText =
            `⏳ Expira en ${minutos}m ${segundos}s`;

    } else {

        document.getElementById("timer").innerText =
            "✅ Acceso permanente";
    }

},1000);

}

</script>

</body>
</html>
